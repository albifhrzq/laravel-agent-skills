name: Scheduled Laravel source and database verification

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.8.0
      - run: npm run check:source-drift

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: '8.3'
          coverage: none
      - run: composer --working-dir=tests/fixtures/laravel-app validate --strict --no-check-all
      - run: composer --working-dir=tests/fixtures/laravel-app audit --locked

  mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: laravel_skill
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: '8.3'
          extensions: pdo_mysql
          coverage: none
      - uses: ramsey/composer-install@b38926e6aa883a48335a05214b1d7afe9d9913ca # 3.1.1
        with:
          working-directory: tests/fixtures/laravel-app
      - run: composer --working-dir=tests/fixtures/laravel-app test:mysql
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_skill
          DB_USERNAME: root
          DB_PASSWORD: secret

  postgresql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: laravel_skill
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d laravel_skill"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f # 2.35.5
        with:
          php-version: '8.3'
          extensions: pdo_pgsql
          coverage: none
      - uses: ramsey/composer-install@b38926e6aa883a48335a05214b1d7afe9d9913ca # 3.1.1
        with:
          working-directory: tests/fixtures/laravel-app
      - run: composer --working-dir=tests/fixtures/laravel-app test:pgsql
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_skill
          DB_USERNAME: postgres
          DB_PASSWORD: secret
